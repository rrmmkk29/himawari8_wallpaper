name: Release Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_label:
        description: "Optional asset label, for example v0.1.0 or rc1"
        required: false
        type: string

permissions:
  contents: write

jobs:
  source-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify Repository
        run: |
          python scripts/repo_check.py

      - name: Build Release Zip
        env:
          RELEASE_LABEL: ${{ github.event.inputs.release_label || github.ref_name }}
        run: |
          if [ -n "$RELEASE_LABEL" ]; then
            python scripts/pack_release.py --label "$RELEASE_LABEL"
          else
            python scripts/pack_release.py
          fi

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-source-package
          path: release/*.zip

  windows-bundle:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,release]"

      - name: Verify Repository
        run: |
          python scripts/repo_check.py

      - name: Build Windows Bundle
        env:
          RELEASE_LABEL: ${{ github.event.inputs.release_label || github.ref_name }}
        run: |
          if ("$env:RELEASE_LABEL") {
            python scripts/build_windows_bundle.py --label "$env:RELEASE_LABEL"
          } else {
            python scripts/build_windows_bundle.py
          }

      - name: Upload Windows Bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-bundle
          path: release/*.zip

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - source-release
      - windows-bundle
    runs-on: ubuntu-latest

    steps:
      - name: Download Release Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip
          generate_release_notes: true
